services:
  postgres:
    image: postgres:17-alpine
    container_name: boardgameproject-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-boardgameproject}
      POSTGRES_USER: ${POSTGRES_USER:-boardgame}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boardgame}
    ports:
      - '5433:5432'
    volumes:
      - boardgameproject-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-boardgame} -d ${POSTGRES_DB:-boardgameproject}',
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: boardgameproject-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@meeplescope.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-227291}
    ports:
      - '5050:80'
    volumes:
      - boardgameproject-pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  boardgameproject-postgres-data:
  boardgameproject-pgadmin-data:
